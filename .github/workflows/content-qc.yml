name: Calyndra Content QC

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  qc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install QC dependencies
        run: pip install pillow pyyaml
      - name: Ensure symbol directories exist
        run: mkdir -p sprout bud sprig vine bloom canopy symbols/{sprout,bud,sprig,vine,bloom,canopy}
      - name: Run band asset QC
        run: python scripts/qc_band_assets.py
      - name: Run ecosystem QC
        run: python scripts/qc_ecosystem.py