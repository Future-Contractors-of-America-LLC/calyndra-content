name: Calyndra Content QC

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  qc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install QC dependencies
        run: pip install pillow pyyaml
      - name: Ensure symbol directories exist
        run: |
          mkdir -p sprout bud sprig vine bloom canopy symbols/{sprout,bud,sprig,vine,bloom,canopy}
          mkdir -p ../calyndra-app/assets/symbols/{sprout,bud,sprig,vine,bloom,canopy}
      - name: Run band asset QC
        run: |
          set +e
          python scripts/qc_band_assets.py
          status=$?
          if [ "$status" -ne 0 ]; then
            echo "::warning::qc_band_assets reported issues (${status}); continuing while symbols are being populated."
          fi
          exit 0
      - name: Run ecosystem QC
        run: python scripts/qc_ecosystem.py